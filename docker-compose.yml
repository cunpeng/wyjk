version: '3.8'

services:
  wyjk:
    image: wyjk:latest
    container_name: wyjk
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6822:6822"
    environment:
      - TZ=Asia/Shanghai
      - PORT=6822
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6822/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
