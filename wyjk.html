<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
    <title>网页变动监控器 · 多代理版</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --border: #e2e5ea;
            --primary: #4f6ef7;
            --primary-hover: #3b54d4;
            --primary-light: #eef1fe;
            --success: #10b981;
            --success-light: #ecfdf5;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Noto Sans Mono', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1117;
                --card-bg: #1a1d27;
                --text: #e8e8f0;
                --text-secondary: #a0a4b8;
                --border: #2a2d3a;
                --primary: #6b8aff;
                --primary-hover: #8a9fff;
                --primary-light: #1a1f35;
                --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
                --shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            line-height: 1.5;
            padding: 12px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 4px;
        }
        .header-icon { font-size: 28px; flex-shrink: 0; }
        .header-info { flex: 1; min-width: 0; }
        .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }
        .header-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: -2px; }

        .status-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
            transition: all var(--transition); background: #c0c4d0;
        }
        .status-dot.running { background: var(--success); animation: pulse-dot 2s infinite; }
        .status-dot.paused { background: var(--warning); }
        .status-dot.stopped { background: #c0c4d0; }
        @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 var(--success); } 50% { box-shadow: 0 0 0 10px transparent; } }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 18px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        @media (min-width: 600px) { .card { padding: 22px 20px; } }

        .card-title {
            font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }

        .form-group { margin-bottom: 13px; }
        .form-label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 5px; }
        .form-label .hint { font-weight: 400; color: var(--text-secondary); font-size: 0.75rem; }
        .form-input {
            width: 100%; padding: 11px 14px; font-size: 0.9rem; font-family: var(--font-sans);
            border: 2px solid var(--border); border-radius: var(--radius); background: var(--bg);
            color: var(--text); transition: all var(--transition); outline: none; -webkit-appearance: none;
        }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); background: var(--card-bg); }
        .form-input.input-url { font-family: var(--font-mono); font-size: 0.82rem; }
        .form-input.input-keywords { font-family: var(--font-mono); font-size: 0.85rem; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 120px; margin-bottom: 0; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 16px; font-size: 0.85rem; font-weight: 600; border-radius: var(--radius);
            border: none; cursor: pointer; transition: all var(--transition); white-space: nowrap;
            min-height: 44px; user-select: none; position: relative; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(79,110,247,0.3); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; color: var(--text); border: 2px solid var(--border); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .btn-sm { padding: 8px 12px; font-size: 0.78rem; min-height: 36px; border-radius: var(--radius-sm); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-group .btn { flex: 1; min-width: 90px; }

        .status-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .status-item {
            flex: 1; min-width: 80px; background: var(--bg); border-radius: var(--radius);
            padding: 10px 8px; text-align: center;
        }
        .status-item .value { font-size: 1.1rem; font-weight: 700; font-family: var(--font-mono); }
        .status-item .label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .status-item.countdown .value { color: var(--primary); font-weight: 700; letter-spacing: 0.02em; }

        .log-container {
            max-height: 260px; overflow-y: auto; border-radius: var(--radius);
            background: var(--bg); border: 1px solid var(--border);
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        @media (min-width: 600px) { .log-container { max-height: 320px; } }
        .log-empty { padding: 30px 20px; text-align: center; color: var(--text-secondary); font-size: 0.85rem; }
        .log-entry {
            padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.8rem;
            font-family: var(--font-mono); line-height: 1.5; display: flex; gap: 10px; align-items: flex-start;
        }
        .log-time { color: var(--text-secondary); white-space: nowrap; font-size: 0.72rem; flex-shrink: 0; }
        .log-msg { flex: 1; word-break: break-all; }
        .highlight-change { color: var(--warning); font-weight: 600; }
        .highlight-match { color: var(--success); font-weight: 600; }
        .highlight-error { color: var(--danger); font-weight: 600; }

        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1a1a2e; color: #fff; padding: 12px 24px; border-radius: 25px;
            font-size: 0.85rem; font-weight: 600; z-index: 999; pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow-lg); max-width: 90vw; text-align: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }

        .import-export-group {
            display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
        }
        .btn-file { display: none; }

        @media (max-width: 400px) {
            .btn { padding: 10px 8px; font-size: 0.78rem; }
            .form-row { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-icon">🔍</div>
        <div class="header-info">
            <div class="header-title">网页变动监控器</div>
            <div class="header-subtitle" id="headerStatus">就绪 - 等待配置</div>
        </div>
        <div class="status-dot stopped" id="statusDot"></div>
    </div>

    <div class="card">
        <div class="card-title">⚙️ 监控配置</div>
        <div class="form-group">
            <label class="form-label" for="proxyUrl">代理地址 <span class="hint">（留空则直连，默认自动切换备用代理）</span></label>
            <input type="text" class="form-input input-url" id="proxyUrl" value="https://api.allorigins.win/raw?url=">
        </div>
        <div class="form-group">
            <label class="form-label" for="targetUrl">目标网址</label>
            <input type="url" class="form-input input-url" id="targetUrl" placeholder="https://example.com" autocomplete="url">
        </div>
        <div class="form-group">
            <label class="form-label" for="keywords">关键词（空格分隔，需同时满足）</label>
            <input type="text" class="form-input input-keywords" id="keywords" placeholder="例如：上新 降价">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="intervalMinutes">检查间隔（分钟）</label>
                <input type="number" class="form-input" id="intervalMinutes" value="5" min="1" max="1440" step="1">
            </div>
            <div class="form-group">
                <label class="form-label" for="pushdeerKey">PushDeer Key（可选）</label>
                <input type="text" class="form-input" id="pushdeerKey" placeholder="PDUxxxx...">
            </div>
        </div>
        <div class="import-export-group">
            <button class="btn btn-outline btn-sm" id="btnExport">📤 导出配置</button>
            <button class="btn btn-outline btn-sm" id="btnImport">📥 导入配置</button>
            <input type="file" id="importFile" class="btn-file" accept=".json">
        </div>
    </div>

    <div class="card">
        <div class="card-title">🎮 控制</div>
        <div class="btn-group">
            <button class="btn btn-primary" id="btnStart">▶ 开始监控</button>
            <button class="btn btn-outline" id="btnPause" disabled>⏸ 暂停</button>
            <button class="btn btn-outline btn-sm" id="btnReset">🔄 重置基准</button>
            <button class="btn btn-outline btn-sm" id="btnTestPush">🔔 测试推送</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 状态</div>
        <div class="status-bar">
            <div class="status-item"><div class="value" id="statusChecks">0</div><div class="label">检查次数</div></div>
            <div class="status-item"><div class="value" id="statusChanges">0</div><div class="label">变化次数</div></div>
            <div class="status-item"><div class="value" id="statusLastCheck">--:--</div><div class="label">上次检查</div></div>
            <div class="status-item countdown"><div class="value" id="statusNextCheck">--:--</div><div class="label">下次检查</div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📋 日志 <button class="btn btn-outline btn-sm" id="btnClearLog" style="margin-left:auto;">清空</button></div>
        <div class="log-container" id="logContainer">
            <div class="log-empty" id="logEmpty">日志将在此显示…</div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
    (function() {
        const $ = (s) => document.getElementById(s);
        const proxyUrl = $('proxyUrl'), targetUrl = $('targetUrl'), keywords = $('keywords'),
            intervalMinutes = $('intervalMinutes'), pushdeerKey = $('pushdeerKey');
        const btnStart = $('btnStart'), btnPause = $('btnPause'), btnReset = $('btnReset'),
            btnTestPush = $('btnTestPush'), btnClearLog = $('btnClearLog');
        const statusDot = $('statusDot'), headerStatus = $('headerStatus');
        const logContainer = $('logContainer'), logEmpty = $('logEmpty'), toast = $('toast');
        const statusChecks = $('statusChecks'), statusChanges = $('statusChanges'),
            statusLastCheck = $('statusLastCheck'), statusNextCheck = $('statusNextCheck');
        const btnExport = $('btnExport'), btnImport = $('btnImport'), importFile = $('importFile');

        const STORAGE_KEY = 'web_monitor_v7_stable_ui';
        const MAX_LOGS = 80;
        const BACKUP_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?url='
        ];

        let state = {
            proxyUrl: 'https://api.allorigins.win/raw?url=',
            targetUrl: '', keywords: '', intervalMinutes: 5, pushdeerKey: '',
            isRunning: false, isPaused: false,
            baselineHash: null, baselineLength: 0,
            totalChecks: 0, totalChanges: 0,
            lastCheckTime: null, nextCheckTime: null,
            logs: []
        };
        let checkTimer = null, countdownTimer = null, isChecking = false, toastTimer = null;

        function saveState() {
            try {
                const toSave = { ...state, isRunning: false, isPaused: false, logs: state.logs.slice(-MAX_LOGS) };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
            } catch(e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const saved = JSON.parse(raw);
                    Object.assign(state, saved);
                    state.isRunning = false; state.isPaused = false;
                    state.nextCheckTime = null;
                    state.logs = Array.isArray(saved.logs) ? saved.logs.slice(-MAX_LOGS) : [];
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function addLog(type, msg) {
            state.logs.push({ type, msg, time: Date.now() });
            if (state.logs.length > MAX_LOGS) state.logs = state.logs.slice(-MAX_LOGS);
            renderLogs(); saveState();
        }

        function renderLogs() {
            if (!state.logs.length) { logEmpty.style.display = 'block'; logContainer.querySelectorAll('.log-entry').forEach(e=>e.remove()); return; }
            logEmpty.style.display = 'none';
            const currentScroll = logContainer.scrollTop;
            const atBottom = (logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight) < 40;
            logContainer.querySelectorAll('.log-entry').forEach(e=>e.remove());
            state.logs.forEach(l => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                const t = new Date(l.time);
                const timeStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
                div.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-msg">${escapeHtml(l.msg)}</span>`;
                logContainer.appendChild(div);
            });
            logContainer.scrollTop = atBottom ? logContainer.scrollHeight : currentScroll;
        }

        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function showToast(msg, type='') {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = msg; toast.className = `toast ${type} show`;
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function computeHash(str) {
            let hash = 5381;
            for (let i=0; i<str.length; i++) hash = ((hash<<5)+hash+str.charCodeAt(i)) & 0x7fffffff;
            return hash.toString(36);
        }

        function extractText(html) {
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                return (doc.body?.textContent || '').replace(/[\s\n\r\t]+/g, ' ').trim();
            } catch(e) {
                return html.replace(/<[^>]*>/g, ' ').replace(/[\s\n\r\t]+/g, ' ').trim();
            }
        }

        function sanitizeForComparison(text, forHash = true) {
            let clean = text;
            clean = clean.replace(/\d{4}-\d{2}-\d{2}/g, '');
            clean = clean.replace(/\d{1,2}:\d{2}(:\d{2})?/g, '');
            if (forHash) clean = clean.replace(/\d+/g, '');
            return clean.replace(/[\s\n\r\t]+/g, ' ').trim();
        }

        async function tryFetchWithProxy(rawUrl, proxyTemplate) {
            let url = rawUrl.trim();
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            const encodedUrl = encodeURIComponent(url);
            const finalUrl = proxyTemplate + encodedUrl;
            const ctrl = new AbortController();
            const id = setTimeout(() => ctrl.abort(), 25000);
            const res = await fetch(finalUrl, {
                signal: ctrl.signal,
                headers: { 'User-Agent': 'Mozilla/5.0 (compatible; WebMonitor/1.0)' }
            });
            clearTimeout(id);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.text();
        }

        async function fetchPage(url) {
            const customProxy = state.proxyUrl.trim();
            const proxies = customProxy
                ? [customProxy, ...BACKUP_PROXIES.filter(p => p !== customProxy)]
                : BACKUP_PROXIES;

            for (const proxy of proxies) {
                try {
                    const html = await tryFetchWithProxy(url, proxy);
                    return { success: true, html, proxyUsed: proxy };
                } catch (err) {
                    console.warn(`代理 ${proxy} 失败: ${err.message}`);
                    continue;
                }
            }
            // 所有代理失败，尝试直连
            try {
                let directUrl = url.trim();
                if (!/^https?:\/\//i.test(directUrl)) directUrl = 'https://' + directUrl;
                const ctrl = new AbortController();
                const id = setTimeout(() => ctrl.abort(), 20000);
                const res = await fetch(directUrl, {
                    signal: ctrl.signal,
                    headers: { 'User-Agent': 'Mozilla/5.0 (compatible; WebMonitor/1.0)' }
                });
                clearTimeout(id);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const html = await res.text();
                return { success: true, html, proxyUsed: '直连' };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        function checkKeywords(text, kwStr) {
            if (!kwStr.trim()) return { allFound: true, missing: [], kwList: [] };
            const kwList = kwStr.trim().split(/\s+/).filter(k=>k);
            const lower = text.toLowerCase();
            const missing = kwList.filter(k => !lower.includes(k.toLowerCase()));
            return { allFound: missing.length===0, missing, kwList };
        }

        async function sendPushDeer(key, title, content) {
            if (!key.trim()) return { success: false };
            const params = new URLSearchParams({ pushkey: key.trim(), text: title, desp: content, type: 'text' });
            const url = `https://api2.pushdeer.com/message/push?${params}`;
            try {
                await fetch(url, { mode: 'no-cors' });
                return { success: true };
            } catch(e) {
                return { success: true };
            }
        }

        function notifyBrowser(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                try { new Notification(title, { body, tag: 'web-monitor' }); } catch(e) {}
            }
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
                osc.start(); osc.stop(ctx.currentTime+0.3);
                setTimeout(() => { osc.disconnect(); gain.disconnect(); ctx.close().catch(()=>{}); }, 400);
            } catch(e) {}
        }

        async function performCheck(manual=false) {
            if (isChecking || !state.targetUrl.trim()) return;
            isChecking = true;
            const url = state.targetUrl.trim();
            try {
                const result = await fetchPage(url);
                if (!result.success) {
                    addLog('error', `获取失败: ${result.error}`);
                    state.lastCheckTime = Date.now(); state.totalChecks++;
                } else {
                    const rawText = extractText(result.html);
                    const hashText = sanitizeForComparison(rawText, true);
                    const displayText = sanitizeForComparison(rawText, false);
                    const hash = computeHash(hashText);
                    state.lastCheckTime = Date.now(); state.totalChecks++;

                    const hasBaseline = state.baselineHash !== null;
                    const changed = hasBaseline && (hash !== state.baselineHash);
                    let shouldNotify = false;

                    if (!hasBaseline) {
                        state.baselineHash = hash;
                        state.baselineLength = hashText.length;
                        addLog('system', `📌 基准已建立（忽略数字后长度：${hashText.length}，通过: ${result.proxyUsed || '代理'}）`);
                        if (manual) showToast('基准已建立', 'success');
                    } else if (changed) {
                        state.totalChanges++;
                        const kw = checkKeywords(displayText, state.keywords);
                        if (kw.allFound) {
                            shouldNotify = true;
                            addLog('change', `🔔 文本变化！关键词匹配：${kw.kwList.join(', ') || '无限制'}`);
                        } else {
                            addLog('change', `文本变化但关键词不匹配（缺失：${kw.missing.join(', ')}）`);
                        }
                        state.baselineHash = hash;
                        state.baselineLength = hashText.length;
                    } else {
                        if (manual || state.totalChecks % 15 === 0) {
                            addLog('info', '✅ 周期检查: 无变化');
                        }
                    }

                    if (shouldNotify) {
                        const title = `🔔 网页变动: ${url}`;
                        const body = `匹配关键词: ${state.keywords || '无'}\n时间: ${new Date().toLocaleString()}`;
                        notifyBrowser(title, body);
                        playBeep();
                        if (state.pushdeerKey.trim()) {
                            const pushRes = await sendPushDeer(state.pushdeerKey, title, body);
                            if (pushRes.success) addLog('push', '📤 推送已发送');
                            else addLog('error', '推送失败');
                        }
                    }
                }
            } catch(e) {
                addLog('error', `异常: ${e.message}`);
                state.lastCheckTime = Date.now(); state.totalChecks++;
            } finally {
                isChecking = false;
                updateStatus();
                saveState();
                if (state.isRunning && !state.isPaused) scheduleNext();
                if (manual) updateUI();
            }
        }

        function scheduleNext() {
            if (checkTimer) clearTimeout(checkTimer);
            if (!state.isRunning || state.isPaused) return;
            const ms = state.intervalMinutes * 60000;
            state.nextCheckTime = Date.now() + ms;
            checkTimer = setTimeout(() => { if (state.isRunning && !state.isPaused) performCheck(); }, ms);
            startCountdown();
        }

        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                if (!state.nextCheckTime || !state.isRunning || state.isPaused) {
                    statusNextCheck.textContent = '--:--';
                    return;
                }
                const remain = Math.max(0, state.nextCheckTime - Date.now());
                const mins = Math.floor(remain / 60000);
                const secs = Math.floor((remain % 60000) / 1000);
                statusNextCheck.textContent = `${mins}:${String(secs).padStart(2,'0')}`;
            }, 200);
        }

        function updateStatus() {
            statusChecks.textContent = state.totalChecks;
            statusChanges.textContent = state.totalChanges;
            statusLastCheck.textContent = state.lastCheckTime ? new Date(state.lastCheckTime).toLocaleTimeString('zh-CN', {hour12:false}) : '--:--';
            if (!state.isRunning || state.isPaused || !state.nextCheckTime) statusNextCheck.textContent = '--:--';
            updateDot();
        }

        function updateDot() {
            statusDot.className = 'status-dot ' + (state.isRunning && !state.isPaused ? 'running' : state.isPaused ? 'paused' : 'stopped');
        }

        function updateUI() {
            proxyUrl.value = state.proxyUrl;
            targetUrl.value = state.targetUrl; keywords.value = state.keywords;
            intervalMinutes.value = state.intervalMinutes; pushdeerKey.value = state.pushdeerKey;
            btnStart.textContent = state.isPaused ? '▶ 继续' : '▶ 开始监控';
            btnStart.disabled = state.isRunning && !state.isPaused;
            btnPause.disabled = !(state.isRunning && !state.isPaused);
            headerStatus.textContent = state.isRunning && !state.isPaused ? `运行中 · 间隔${state.intervalMinutes}分钟` : state.isPaused ? '已暂停' : '就绪 · 多代理自动切换';
            updateStatus();
            renderLogs();
        }

        function start() {
            if (!state.targetUrl.trim().startsWith('http')) { showToast('请输入有效网址', 'error'); return; }
            state.isRunning = true; state.isPaused = false;
            state.proxyUrl = proxyUrl.value.trim();
            state.keywords = keywords.value.trim(); state.intervalMinutes = Math.max(1, parseInt(intervalMinutes.value)||5);
            state.pushdeerKey = pushdeerKey.value.trim();
            if ('Notification' in window) Notification.requestPermission();
            updateUI(); saveState();
            addLog('system', `🚀 监控启动（首选代理: ${state.proxyUrl || '直连'}）`);
            performCheck(true);
        }

        function pause() {
            state.isPaused = true;
            if (checkTimer) clearTimeout(checkTimer);
            state.nextCheckTime = null;
            if (countdownTimer) clearInterval(countdownTimer);
            updateUI(); saveState();
            addLog('system', '⏸ 暂停');
        }

        function resume() {
            state.isPaused = false;
            updateUI(); saveState();
            addLog('system', '▶ 恢复');
            performCheck(true);
        }

        function resetBaseline() {
            state.baselineHash = null; state.baselineLength = 0;
            updateUI(); saveState();
            addLog('system', '🔄 基准已重置');
            if (state.isRunning && !state.isPaused) performCheck(true);
        }

        async function testPush() {
            const key = pushdeerKey.value.trim();
            if (!key) { showToast('先填写Key', 'error'); return; }
            const res = await sendPushDeer(key, '🧪 测试', 'Web Monitor 测试消息');
            if (res.success) {
                showToast('测试推送已发送', 'success');
                addLog('push', '📤 测试推送已发送');
            } else {
                showToast('推送失败', 'error');
            }
        }

        function exportConfig() {
            const config = {
                proxyUrl: proxyUrl.value.trim(),
                targetUrl: targetUrl.value.trim(),
                keywords: keywords.value.trim(),
                intervalMinutes: intervalMinutes.value,
                pushdeerKey: pushdeerKey.value.trim()
            };
            const blob = new Blob([JSON.stringify(config, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'web-monitor-config.json';
            a.click();
            showToast('配置已导出', 'success');
        }

        function importConfig(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const config = JSON.parse(ev.target.result);
                    proxyUrl.value = config.proxyUrl || 'https://api.allorigins.win/raw?url=';
                    targetUrl.value = config.targetUrl || '';
                    keywords.value = config.keywords || '';
                    intervalMinutes.value = config.intervalMinutes || 5;
                    pushdeerKey.value = config.pushdeerKey || '';
                    state.proxyUrl = proxyUrl.value.trim();
                    state.targetUrl = targetUrl.value.trim();
                    state.keywords = keywords.value.trim();
                    state.intervalMinutes = Math.max(1, parseInt(intervalMinutes.value)||5);
                    state.pushdeerKey = pushdeerKey.value.trim();
                    saveState();
                    updateUI();
                    showToast('配置已导入', 'success');
                    addLog('system', '📥 配置已从文件导入');
                } catch(ex) {
                    showToast('文件格式错误', 'error');
                }
            };
            reader.readAsText(file);
            importFile.value = '';
        }

        // 事件绑定
        btnStart.addEventListener('click', () => state.isPaused ? resume() : start());
        btnPause.addEventListener('click', pause);
        btnReset.addEventListener('click', resetBaseline);
        btnTestPush.addEventListener('click', testPush);
        btnClearLog.addEventListener('click', () => { state.logs = []; renderLogs(); saveState(); });
        btnExport.addEventListener('click', exportConfig);
        btnImport.addEventListener('click', () => importFile.click());
        importFile.addEventListener('change', importConfig);

        [proxyUrl, targetUrl, keywords, intervalMinutes, pushdeerKey].forEach(el => el.addEventListener('change', () => {
            state.proxyUrl = proxyUrl.value.trim();
            state.targetUrl = targetUrl.value.trim();
            state.keywords = keywords.value.trim();
            state.intervalMinutes = Math.max(1, parseInt(intervalMinutes.value)||1);
            state.pushdeerKey = pushdeerKey.value.trim();
            saveState();
        }));

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.isRunning && !state.isPaused && state.lastCheckTime) {
                const elapsed = Date.now() - state.lastCheckTime;
                if (elapsed > state.intervalMinutes * 60000 * 0.8) {
                    if (checkTimer) clearTimeout(checkTimer);
                    performCheck();
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (checkTimer) clearTimeout(checkTimer);
            if (countdownTimer) clearInterval(countdownTimer);
            state.isRunning = false; state.isPaused = false;
            saveState();
        });

        // 初始化
        loadState();
        proxyUrl.value = state.proxyUrl || 'https://api.allorigins.win/raw?url=';
        targetUrl.value = state.targetUrl;
        keywords.value = state.keywords;
        intervalMinutes.value = state.intervalMinutes;
        pushdeerKey.value = state.pushdeerKey;
        updateUI();
        renderLogs();
        if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    })();
</script>
</body>
</html>
